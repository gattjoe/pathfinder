apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            name: "vader"
  template:
    metadata:
      name: ingress-nginx
    spec:
      project: default
      source:
        repoURL: https://github.com/kubernetes/ingress-nginx.git
        path: deploy/static/provider/cloud
        targetRevision: af6352cbe46e3c384c69c28257efa99535b97c80 # v1.12.3
      #        - repoURL: https://github.com/gattjoe/pathfinder.git
      #          path: ingress
      #          targetRevision: HEAD
      destination:
        server: "{{.server}}"
        namespace: ingress-nginx
      syncPolicy:
        automated: {}
