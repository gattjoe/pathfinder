apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kube-state-metrics
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            name: "vader"
  template:
    metadata:
      name: kube-state-metrics
    spec:
      project: default
      source:
        path: examples/standard
        repoURL: https://github.com/kubernetes/kube-state-metrics.git
        targetRevision: HEAD
      destination:
        server: "{{.server}}"
        namespace: kube-system
      syncPolicy:
        automated: {}
